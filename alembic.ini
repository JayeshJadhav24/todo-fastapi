# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# A SQLAlchemy database URL.
# We leave this empty here and set it dynamically in alembic/env.py
# by reading from our app's settings (which reads from .env).
# This way DATABASE_URL is never duplicated.
sqlalchemy.url =

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
