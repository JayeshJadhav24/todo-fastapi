# .github/workflows/ci.yml - GitHub Actions CI/CD Pipeline
#
# Pipeline order:
#   1. Install uv
#   2. Install dependencies
#   3. Ruff lint   <- if this fails, pipeline FAILS (quality gate)
#   4. Ruff format check
#   5. Unit tests
#   6. Integration tests
#   7. E2E tests
#   8. Coverage report
#
# Matrix: runs on Python 3.11 AND 3.12 in parallel.

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    name: "Python ${{ matrix.python-version }} - Lint + Test"
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run Ruff lint
        run: uv run ruff check .

      - name: Check code formatting
        run: uv run ruff format --check .

      - name: Unit tests
        run: uv run pytest app/tests/test_unit.py --override-ini="addopts=" -v

      - name: Integration tests
        run: uv run pytest app/tests/test_integration.py --override-ini="addopts=" -v

      - name: E2E tests
        run: uv run pytest app/tests/test_e2e.py --override-ini="addopts=" -v

      - name: Coverage report
        run: uv run pytest --cov=app --cov-report=xml --cov-report=term-missing
